<!DOCTYPE html>
<html>
<head>
    <title>AI HR Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Chat Bubble -->
<div id="chat-bubble" onclick="toggleChat()">💬</div>

<!-- Chat Window -->
<div id="chat-container" class="hidden">
    <div id="chat-header">
        AI HR Assistant
        <span onclick="toggleChat()" id="close-btn">✖</span>
    </div>

    <div id="chat-box"></div>

    <div id="typing" class="hidden">Bot is typing...</div>

    <div id="chat-input">
        <input type="text" id="user-input" placeholder="Ask something..." />
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="chat.js"></script>
</body>
</html>
